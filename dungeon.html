<!DOCTYPE html>
<html>
<head>
<title>D0.3</title>
<style>/* <![CDATA[ */

* {
	box-sizing: border-box;
}

body {
	margin: 0;
	padding: 0;
	border: none;
	background-color: black;
}

main {
	margin: 0;
	padding: 0;
	border: none;
}

#the-view {
	background-color: rgb(10,10,10);
	width: 100vw; /* calc(100vw - 20px); */
	/* Actual 100vh seems to result in overflow in Edge, so subtract a few pixels */
	height: calc(100vh - 10px);
	margin: 0;
	padding: 0;
	border: none;
	outline: none;
}

#the-view:focus {
	border: none;
	outline: none;
}

/* ]]> */</style>
</head>
<body>

<canvas id="the-view" tabindex="0"></canvas>

<script type="text/javascript" src="./dungeon.js"></script>

</body>
</html>
